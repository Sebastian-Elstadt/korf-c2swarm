<header class="app-header">
  <div class="brand">
    <span class="brand-mark">KORF</span>
    <span class="brand-sub">kommander</span>
  </div>
  <div
    class="health"
    role="status"
    [attr.aria-label]="healthLabel()"
  >

      [class.health-dot--ok]="healthOk()"

    <span class="health-text">/api/health</span>
  </div>
</header>
<main class="main">
  <router-outlet />
</main>
